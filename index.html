<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vitrinas - Instituto</title>
  <script src="datos.js"></script>
  <style>
    body { font-family: -apple-system, sans-serif; padding: 20px; background: #f0f2f5; color: #1c1e21; margin: 0; }
    h1 { text-align: center; color: #1a73e8; }
    h2 { margin-top: 25px; border-bottom: 2px solid #ccc; padding-bottom: 5px; }
    .boton-menu { 
      display: block; background: white; margin: 12px 0; padding: 18px; 
      text-decoration: none; color: #000; border-radius: 12px; 
      box-shadow: 0 2px 5px rgba(0,0,0,0.1); font-weight: bold; font-size: 1.1em;
      border: 1px solid #ddd;
    }
    .boton-menu:active { background: #e8f0fe; transform: scale(0.98); }
  </style>
</head>
<body>
  <h1>Vitrinas del Instituto</h1>
  <div id="contenido"></div>

  <script>
    let html = "";
    for (let v in datos) {
      html += `<h2>${datos[v].nombre}</h2>`;
      for (let a in datos[v].apartados) {
        const ap = datos[v].apartados[a];
        html += `<a class="boton-menu" href="apartados.html?vitrina=${v}&apartado=${a}">${ap.nombre}</a>`;
      }
    }
    document.getElementById("contenido").innerHTML = html;
  </script>
</body>
</html>
