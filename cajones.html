<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="datos.js"></script>
  <style>
    body { font-family: 'Segoe UI', sans-serif; padding: 20px; background: #f0f2f5; margin: 0; }
    .container { max-width: 900px; margin: auto; }
    h1 { color: #1a73e8; }
    
    .layout { display: grid; grid-template-columns: 1fr; gap: 20px; }
    @media (min-width: 700px) { .layout { grid-template-columns: 300px 1fr; } }

    ul { list-style: none; padding: 0; margin: 0; }
    li { 
      background: white; margin-bottom: 10px; padding: 15px; 
      border-radius: 10px; cursor: pointer; font-weight: 600;
      border: 1px solid #ddd; transition: 0.3s;
    }
    li:hover { border-color: #1a73e8; color: #1a73e8; }
    li.active { background: #1a73e8; color: white; border-color: #1a73e8; }

    #info { 
      background: white; padding: 30px; border-radius: 15px; 
      box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-top: 5px solid #1a73e8;
      min-height: 200px;
    }

    .img-animal {
      display: block;
      max-width: 100%;
      height: auto;
      margin: 15px auto 10px auto;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      cursor: zoom-in;
      transition: transform 0.3s;
    }
    .img-animal:hover { transform: scale(1.02); }

    /* CONTENEDOR DE EXACTAMENTE 3 FOTOS */
    .galeria-preview {
      display: grid;
      grid-template-columns: repeat(3, 1fr); /* Forzamos 3 columnas */
      gap: 10px;
      margin-bottom: 15px;
    }
    .mini-preview {
      width: 100%;
      height: 80px; /* Un poco más altas para que luzcan */
      object-fit: cover;
      border-radius: 8px;
      cursor: pointer;
      border: 2px solid #eee;
      transition: border-color 0.2s;
    }
    .mini-preview:hover { border-color: #1a73e8; }

    .btn-galeria-completa {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #34a853;
      color: white;
      text-decoration: none;
      padding: 12px;
      border-radius: 8px;
      font-weight: bold;
      width: 100%;
      box-sizing: border-box;
      transition: background 0.3s;
    }
    .btn-galeria-completa:hover { background: #2d8a45; }

    .volver { display: inline-block; margin-top: 20px; color: #666; text-decoration: none; }

    .zoom-overlay {
        display: none; position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0, 0, 0, 0.9); z-index: 1000;
        justify-content: center; align-items: center; cursor: zoom-out;
    }
    .zoom-overlay img { max-width: 95%; max-height: 95%; border: 2px solid white; border-radius: 5px; transition: transform 0.2s; }
    .zoom-overlay img.pulsando { transform: scale(0.92); }
  </style>
</head>
<body>
  <div id="zoomCapa" class="zoom-overlay" onclick="cerrarZoom(event)">
      <img id="imgZoomed" src="" onmousedown="iniciarPresion()" onmouseup="cancelarPresion()" ontouchstart="iniciarPresion()" ontouchend="cancelarPresion()">
  </div>

  <div class="container">
    <div id="contenido"></div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const v = params.get("vitrina"), a = params.get("apartado"), c = params.get("cajon");
    const cajon = datos[v]?.apartados[a]?.cajones[c];

    if (cajon) {
      let html = `
        <h1>${cajon.nombre}</h1>
        <div class="layout">
          <div>
            <p>Selecciona un animal:</p>
            <ul>`;
      for (let i in cajon.animales) {
        html += `<li onclick="mostrar(this, ${i})">${cajon.animales[i].nombre}</li>`;
      }
      html += `
            </ul>
            <a class="volver" href="apartados.html?vitrina=${v}&apartado=${a}">← Volver</a>
          </div>
          <div id="info"><i>Haz clic en un animal para ver los detalles.</i></div>
        </div>`;
      document.getElementById("contenido").innerHTML = html;

      window.mostrar = function(elemento, id) {
        document.querySelectorAll('li').forEach(l => l.classList.remove('active'));
        elemento.classList.add('active');

        const animal = cajon.animales[id];
        
        const htmlImagenPrincipal = animal.imagen ? 
            `<img src="${animal.imagen}" class="img-animal" onclick="abrirZoom('${animal.imagen}')" title="Ampliar foto principal">` : '';

        // Lógica para mostrar SOLO 3 miniaturas
        let bloqueGaleria = '';
        if (animal.galeria && animal.galeria.length > 0) {
          bloqueGaleria = '<div class="galeria-preview">';
          
          // El método .slice(0, 3) garantiza que solo se cojan las 3 primeras del array 'galeria'
          animal.galeria.slice(0, 3).forEach(foto => {
            bloqueGaleria += `<img src="${foto}" class="mini-preview" onclick="abrirZoom('${foto}')" title="Vista rápida">`;
          });
          
          bloqueGaleria += '</div>';

          // Botón para ir a la galería completa (galeria.html)
          bloqueGaleria += `
            <a href="galeria.html?vitrina=${v}&apartado=${a}&cajon=${c}&id=${id}" class="btn-galeria-completa">
               📷 Ver galería completa de ${animal.nombre}
            </a>`;
        }

        document.getElementById("info").innerHTML = `
          <h2 style="margin-top:0; color:#1a73e8;">${animal.nombre}</h2>
          ${htmlImagenPrincipal}
          ${bloqueGaleria}
          <p style="font-size:1.1em; line-height:1.7; margin-top:20px;">${animal.info}</p>
        `;

        window.scrollTo({ top: document.getElementById("info").offsetTop - 20, behavior: 'smooth' });
      };
    }

    // ZOOM Y SECRETO CANGREJO
    let timer;
    window.abrirZoom = function(url) {
        const capa = document.getElementById("zoomCapa");
        document.getElementById("imgZoomed").src = url;
        capa.style.display = "flex";
    };

    window.cerrarZoom = function(e) {
        if(e.target.id !== "imgZoomed") document.getElementById("zoomCapa").style.display = "none";
    };

    window.iniciarPresion = function() {
      const nombreActivo = document.querySelector('#info h2')?.innerText;
      if (nombreActivo === "Cangrejo") {
        document.getElementById("imgZoomed").classList.add("pulsando");
        timer = setTimeout(() => alert("¡Secreto de Bichos Mutxamel descubierto! 🦀✨"), 10000);
      }
    };

    window.cancelarPresion = function() {
      document.getElementById("imgZoomed").classList.remove("pulsando");
      clearTimeout(timer);
    };
  </script>
</body>
</html>
