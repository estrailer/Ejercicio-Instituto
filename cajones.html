<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="datos.js"></script>
  <style>
    body { font-family: 'Segoe UI', sans-serif; padding: 20px; background: #f0f2f5; margin: 0; }
    .container { max-width: 900px; margin: auto; }
    h1 { color: #1a73e8; }
    
    .layout { display: grid; grid-template-columns: 1fr; gap: 20px; }
    @media (min-width: 700px) { .layout { grid-template-columns: 300px 1fr; } }

    ul { list-style: none; padding: 0; margin: 0; }
    li { 
      background: white; margin-bottom: 10px; padding: 15px; 
      border-radius: 10px; cursor: pointer; font-weight: 600;
      border: 1px solid #ddd; transition: 0.3s;
    }
    li:hover { border-color: #1a73e8; color: #1a73e8; }
    li.active { background: #1a73e8; color: white; border-color: #1a73e8; }

    #info { 
      background: white; padding: 30px; border-radius: 15px; 
      box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-top: 5px solid #1a73e8;
      min-height: 200px;
    }
    .volver { display: inline-block; margin-top: 20px; color: #666; text-decoration: none; }
  </style>
</head>
<body>
  <div class="container">
    <div id="contenido"></div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const v = params.get("vitrina");
    const a = params.get("apartado");
    const c = params.get("cajon");
    const cajon = datos[v]?.apartados[a]?.cajones[c];

    if (cajon) {
      let html = `
        <h1>${cajon.nombre}</h1>
        <div class="layout">
          <div>
            <p>Selecciona un animal:</p>
            <ul>`;
      for (let i in cajon.animales) {
        html += `<li onclick="mostrar(this, ${i})">${cajon.animales[i].nombre}</li>`;
      }
      html += `
            </ul>
            <a class="volver" href="apartados.html?vitrina=${v}&apartado=${a}">← Volver</a>
          </div>
          <div id="info"><i>Haz clic en un animal para ver los detalles.</i></div>
        </div>`;
      document.getElementById("contenido").innerHTML = html;

      window.mostrar = function(elemento, id) {
        // Quitar clase activa de otros
        document.querySelectorAll('li').forEach(l => l.classList.remove('active'));
        elemento.classList.add('active');

        const animal = cajon.animales[id];
        document.getElementById("info").innerHTML = `
          <h2 style="margin-top:0; color:#1a73e8;">${animal.nombre}</h2>
          <p style="font-size:1.1em; line-height:1.7;">${animal.info}</p>
        `;
      };
    }
  </script>
</body>
</html>
