<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="datos.js"></script>
  <style>
    body { font-family: 'Segoe UI', sans-serif; padding: 20px; background: #f0f2f5; margin: 0; }
    .container { max-width: 900px; margin: auto; }
    h1 { color: #1a73e8; }
    
    .layout { display: grid; grid-template-columns: 1fr; gap: 20px; }
    @media (min-width: 700px) { .layout { grid-template-columns: 300px 1fr; } }

    ul { list-style: none; padding: 0; margin: 0; }
    li { 
      background: white; margin-bottom: 10px; padding: 15px; 
      border-radius: 10px; cursor: pointer; font-weight: 600;
      border: 1px solid #ddd; transition: 0.3s;
    }
    li:hover { border-color: #1a73e8; color: #1a73e8; }
    li.active { background: #1a73e8; color: white; border-color: #1a73e8; }

    #info { 
      background: white; padding: 30px; border-radius: 15px; 
      box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-top: 5px solid #1a73e8;
      min-height: 200px;
    }

    /* Estilos para la imagen del animal */
    .img-animal {
      display: block;
      max-width: 100%;
      height: auto;
      margin: 15px auto;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }

    /* Estilos para el cuadro de ubicación */
    .ubicacion-box {
      margin-top: 15px;
      padding: 12px;
      background-color: #e8f0fe;
      border-radius: 8px;
      border: 1px dashed #1a73e8;
      color: #1a73e8;
      font-size: 0.95em;
    }
    .ubicacion-box strong { display: block; margin-bottom: 5px; }

    .volver { display: inline-block; margin-top: 20px; color: #666; text-decoration: none; }
    /* Estilo para el contenedor del zoom */
    .zoom-overlay {
        display: none; /* Oculto por defecto */
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: rgba(0, 0, 0, 0.9);
        z-index: 1000;
        justify-content: center;
        align-items: center;
        cursor: zoom-out;
    }

    .zoom-overlay img {
        max-width: 95%;
        max-height: 95%;
        border: 2px solid white;
        border-radius: 5px;
    }

    /* Cambiamos el cursor de la imagen original para que sepan que es clicable */
    .img-animal {
        cursor: zoom-in;
        transition: transform 0.3s;
    }

    .img-animal:hover {
        transform: scale(1.02);
    }
  </style>
</head>
<body>
  <div id="zoomCapa" class="zoom-overlay" onclick="cerrarZoom()">
      <img id="imgZoomed" src="">
  </div>
  <div class="container">
    <div id="contenido"></div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const v = params.get("vitrina");
    const a = params.get("apartado");
    const c = params.get("cajon");
    const cajon = datos[v]?.apartados[a]?.cajones[c];

    if (cajon) {
      let html = `
        <h1>${cajon.nombre}</h1>
        <div class="layout">
          <div>
            <p>Selecciona un animal:</p>
            <ul>`;
      for (let i in cajon.animales) {
        html += `<li onclick="mostrar(this, ${i})">${cajon.animales[i].nombre}</li>`;
      }
      html += `
            </ul>
            <a class="volver" href="apartados.html?vitrina=${v}&apartado=${a}">← Volver</a>
          </div>
          <div id="info"><i>Haz clic en un animal para ver los detalles.</i></div>
        </div>`;
      document.getElementById("contenido").innerHTML = html;

      // AQUÍ ESTÁ LA FUNCIÓN ACTUALIZADA
      window.mostrar = function(elemento, id) {
        // Marcamos el animal seleccionado en la lista
        document.querySelectorAll('li').forEach(l => l.classList.remove('active'));
        elemento.classList.add('active');

        const animal = cajon.animales[id];
        
        // Verificamos la ubicación
        const textoUbicacion = animal.ubicacion ? animal.ubicacion : "Ubicación no registrada.";
        
        // Verificamos si hay imagen
        const htmlImagen = animal.imagen ? 
            `<img src="${animal.imagen}" 
                  alt="${animal.nombre}" 
                  class="img-animal" 
                  onclick="abrirZoom('${animal.imagen}')" 
                  title="Haz clic para ampliar">` : '';

        document.getElementById("info").innerHTML = `
          <h2 style="margin-top:0; color:#1a73e8;">${animal.nombre}</h2>
          ${htmlImagen}
          <p style="font-size:1.1em; line-height:1.7;">${animal.info}</p>
          
        `;

        // Scroll suave para móviles
        window.scrollTo({ top: document.getElementById("info").offsetTop - 20, behavior: 'smooth' });
      };
    }
    window.abrirZoom = function(url) {
        const capa = document.getElementById("zoomCapa");
        const img = document.getElementById("imgZoomed");
        img.src = url;
        capa.style.display = "flex";
    };

    window.cerrarZoom = function() {
        document.getElementById("zoomCapa").style.display = "none";
    };
  </script>
</body>
</html>
