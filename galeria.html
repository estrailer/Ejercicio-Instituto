<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galería de Imágenes</title>
    <script src="datos.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #111; color: white; margin: 0; padding: 20px; }
        .header-galeria { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .btn-volver { color: #aaa; text-decoration: none; font-size: 0.9em; }
        
        .grid-galeria { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); 
            gap: 15px; 
        }
        
        .foto-item { width: 100%; height: 200px; object-fit: cover; border-radius: 10px; cursor: pointer; transition: 0.3s; }
        .foto-item:hover { transform: scale(1.03); filter: brightness(1.2); }

        /* El zoom que ya tenías para verlas en grande */
        .zoom-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; justify-content: center; align-items: center; }
        .zoom-overlay img { max-width: 95%; max-height: 95%; border: 1px solid #444; }
    </style>
</head>
<body>

    <div class="header-galeria">
        <h1 id="titulo-animal">Galería</h1>
        <a href="javascript:history.back()" class="btn-volver">← Volver atrás</a>
    </div>

    <div id="contenedor-fotos" class="grid-galeria"></div>

    <div id="zoomCapa" class="zoom-overlay" onclick="this.style.display='none'">
        <img id="imgZoomed" src="">
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const v = params.get("vitrina"), a = params.get("apartado"), c = params.get("cajon"), id = params.get("id");
        
        const animal = datos[v]?.apartados[a]?.cajones[c]?.animales[id];

        if (animal) {
            document.getElementById("titulo-animal").innerText = `Fotos de: ${animal.nombre}`;
            let html = "";
            
            // Añadimos la imagen principal y luego la galería extra
            const todasLasFotos = [animal.imagen, ...(animal.galeria || [])];
            
            todasLasFotos.forEach(foto => {
                if(foto) {
                    html += `<img src="${foto}" class="foto-item" onclick="verGrande('${foto}')">`;
                }
            });
            document.getElementById("contenedor-fotos").innerHTML = html;
        }

        function verGrande(url) {
            document.getElementById("imgZoomed").src = url;
            document.getElementById("zoomCapa").style.display = "flex";
        }
    </script>
</body>
</html>
