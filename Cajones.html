<!DOCTYPE html>
<html>
<head>
  <script src="datos.js"></script>
</head>
<body>

<div id="contenido"></div>

<script>
const params = new URLSearchParams(window.location.search);
const v = params.get("vitrina");
const a = params.get("apartado");
const c = params.get("cajon");

const cajon = datos[v]?.apartados[a]?.cajones[c];

if (cajon) {

  let html = `<h1>${cajon.nombre}</h1><ul>`;

  for (let i in cajon.animales) {
    html += `
      <li onclick="mostrar(${i})" style="cursor:pointer;">
        ${cajon.animales[i].nombre}
      </li>
    `;
  }

  html += `</ul><div id="info"></div>`;

  html += `
    <br><a href="apartados.html?vitrina=${v}&apartado=${a}">
      ← Volver
    </a>
  `;

  document.getElementById("contenido").innerHTML = html;

  window.mostrar = function(id) {
    const animal = cajon.animales[id];
    document.getElementById("info").innerHTML = `
      <h2>${animal.nombre}</h2>
      <p>${animal.info}</p>
    `;
  };
}
</script>

</body>
</html>
